<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>진실의 옥상 · Truth Rooftop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jua&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   진실의 옥상 (Truth Rooftop) — 장소 기반 감성 메신저
   단일 파일 프로토타입 · CSS/SVG 비주얼
   ============================================================ */
:root{
  /* 메인 */
  --navy-0:#0b1026;     /* 가장 깊은 밤 */
  --navy-1:#141a3a;
  --navy-2:#1d2350;
  --navy-3:#272e63;
  --purple-1:#3a2d6b;
  --purple-2:#5b4a9e;
  --purple-glow:#7c6bd6;
  /* 포인트 */
  --sunset:#ff9a52;     /* 노을 주황 */
  --sunset-deep:#ff6b4a;
  --lamp:#ffd47e;       /* 노란 조명 */
  --star:#fff4cf;
  /* 텍스트 */
  --ink:#f4f2ff;
  --ink-dim:#b9b6d8;
  --ink-faint:#7d7aa6;
  /* 표면 */
  --card:rgba(38,44,92,.55);
  --card-solid:#222850;
  --bubble-me:linear-gradient(135deg,#ff9a52,#ff6b6b);
  --bubble-you:rgba(255,255,255,.10);
  --line:rgba(255,255,255,.09);
  --ok:#7ee0a8;
  --shadow:0 18px 50px rgba(0,0,0,.55);
  --r:22px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;margin:0;}
body{
  font-family:'Gowun Dodum',system-ui,sans-serif;
  background:
    radial-gradient(1200px 700px at 20% -10%, #2a2257 0%, transparent 55%),
    radial-gradient(1000px 800px at 110% 10%, #3a2256 0%, transparent 50%),
    linear-gradient(180deg,#0a0e22 0%, #11102b 60%, #1a1330 100%);
  color:var(--ink);
  display:flex;align-items:center;justify-content:center;
  min-height:100dvh;padding:24px;overflow:hidden;
}
/* 배경 별 */
.bg-stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.bg-stars i{position:absolute;width:2px;height:2px;border-radius:50%;background:var(--star);opacity:.5;animation:tw 4s infinite}
@keyframes tw{0%,100%{opacity:.15}50%{opacity:.9}}

/* ===== 폰 프레임 ===== */
.phone{
  position:relative;z-index:1;
  width:390px;height:min(844px,94dvh);
  background:linear-gradient(180deg,var(--navy-1),var(--navy-0));
  border-radius:46px;
  box-shadow:var(--shadow), inset 0 0 0 2px rgba(255,255,255,.06);
  overflow:hidden;display:flex;flex-direction:column;
}
.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);
  width:120px;height:26px;background:#05060f;border-radius:16px;z-index:60;}
.statusbar{height:44px;flex:0 0 44px;display:flex;align-items:flex-end;justify-content:space-between;
  padding:0 24px 6px;font-size:13px;color:var(--ink);font-weight:bold;z-index:55;position:relative;}
.statusbar .right{display:flex;gap:6px;align-items:center;font-size:11px}

/* 스크린 컨테이너 */
.screen-wrap{flex:1;position:relative;overflow:hidden;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;
  opacity:0;transform:translateX(30px);pointer-events:none;transition:opacity .32s, transform .32s;}
.screen.active{opacity:1;transform:none;pointer-events:auto;}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{width:0}

/* ===== 공통 헤더 ===== */
.appbar{display:flex;align-items:center;gap:12px;padding:8px 18px 12px;flex:0 0 auto;position:relative;z-index:5;}
.appbar .back{width:34px;height:34px;border-radius:12px;display:grid;place-items:center;
  background:rgba(255,255,255,.07);cursor:pointer;font-size:18px;flex:0 0 auto;border:none;color:var(--ink)}
.appbar h1{font-family:'Jua';font-size:22px;margin:0;letter-spacing:.5px;flex:1}
.appbar .sub{font-size:11px;color:var(--ink-dim);font-weight:normal}
.appbar .ico-btn{width:34px;height:34px;border-radius:12px;display:grid;place-items:center;background:rgba(255,255,255,.07);border:none;color:var(--ink);cursor:pointer;font-size:16px}

/* 로고 헤더 */
.logo-head{padding:14px 20px 6px;}
.logo-head .title{font-family:'Jua';font-size:30px;line-height:1;background:linear-gradient(90deg,var(--lamp),var(--sunset));-webkit-background-clip:text;background-clip:text;color:transparent;}
.logo-head .moon{font-size:24px}
.logo-head .tagline{font-size:12px;color:var(--ink-dim);margin-top:6px}

/* 칩 */
.chips{display:flex;gap:8px;padding:10px 20px 4px;overflow-x:auto}
.chips::-webkit-scrollbar{height:0}
.chip{flex:0 0 auto;padding:7px 14px;border-radius:20px;font-size:12px;background:rgba(255,255,255,.06);
  border:1px solid var(--line);color:var(--ink-dim);cursor:pointer;white-space:nowrap;transition:.2s}
.chip.on{background:linear-gradient(120deg,var(--sunset),var(--sunset-deep));color:#fff;border-color:transparent;font-weight:bold}

/* ===== 채팅 리스트 ===== */
.clist{padding:6px 12px 90px}
.crow{display:flex;gap:12px;align-items:center;padding:12px 10px;border-radius:18px;cursor:pointer;transition:.2s}
.crow:active{background:rgba(255,255,255,.05)}
.avatar{width:50px;height:50px;border-radius:16px;flex:0 0 auto;display:grid;place-items:center;font-size:24px;position:relative;overflow:hidden}
.crow .meta{flex:1;min-width:0}
.crow .meta .top{display:flex;justify-content:space-between;align-items:center}
.crow .name{font-size:15px;font-weight:bold}
.crow .time{font-size:11px;color:var(--ink-faint)}
.crow .msg{font-size:13px;color:var(--ink-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px}
.badge{background:var(--sunset);color:#3a1500;font-size:11px;font-weight:bold;border-radius:10px;padding:1px 7px;margin-left:8px}
.crow .pin{font-size:11px;color:var(--lamp);background:rgba(255,212,126,.12);border-radius:8px;padding:2px 8px;margin-top:4px;display:inline-block}

/* FAB */
.fab{position:absolute;right:18px;bottom:96px;z-index:30;display:flex;flex-direction:column;gap:10px;align-items:flex-end}
.fab button{border:none;cursor:pointer;font-family:'Jua';color:#3a1500;font-size:14px;
  background:linear-gradient(120deg,var(--lamp),var(--sunset));border-radius:30px;padding:14px 18px;
  box-shadow:0 10px 26px rgba(255,154,82,.4);display:flex;align-items:center;gap:8px}

/* ===== 하단 탭 ===== */
.tabbar{flex:0 0 auto;height:74px;display:flex;align-items:center;justify-content:space-around;
  background:linear-gradient(180deg,rgba(13,16,38,.4),rgba(8,10,26,.95));
  border-top:1px solid var(--line);backdrop-filter:blur(12px);position:relative;z-index:40}
.tab{background:none;border:none;color:var(--ink-faint);font-size:11px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;font-family:inherit;padding:4px 14px}
.tab .ic{font-size:21px;filter:grayscale(.4);opacity:.7}
.tab.on{color:var(--lamp)}
.tab.on .ic{filter:none;opacity:1;transform:translateY(-2px);transition:.2s}

/* ===== 채팅방 ===== */
.chatbg{flex:1;display:flex;flex-direction:column;overflow:hidden}
.msgs{flex:1;overflow-y:auto;padding:14px 14px 8px;display:flex;flex-direction:column;gap:9px}
.msgs::-webkit-scrollbar{width:0}
.bub{max-width:74%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.45;position:relative;animation:pop .3s}
@keyframes pop{from{opacity:0;transform:translateY(8px)}}
.bub.you{align-self:flex-start;background:var(--bubble-you);border-bottom-left-radius:6px}
.bub.me{align-self:flex-end;background:var(--bubble-me);color:#fff;border-bottom-right-radius:6px;box-shadow:0 4px 14px rgba(255,107,107,.3)}
.bub .who{font-size:11px;color:var(--lamp);margin-bottom:3px;font-weight:bold}
.bub .t{font-size:10px;opacity:.6;margin-top:4px;text-align:right}
.daypill{align-self:center;font-size:11px;color:var(--ink-faint);background:rgba(255,255,255,.05);padding:4px 12px;border-radius:12px;margin:4px 0}
.sysline{align-self:center;font-size:12px;color:var(--ink-dim);text-align:center;padding:6px 14px;background:rgba(124,107,214,.14);border-radius:14px;max-width:85%}

/* 초대 카드 (채팅 안) */
.invite-card{align-self:flex-end;max-width:78%;background:linear-gradient(150deg,var(--purple-2),var(--purple-1));border-radius:18px;padding:14px;border:1px solid rgba(255,255,255,.14);box-shadow:var(--shadow);animation:pop .3s}
.invite-card.in{align-self:flex-start}
.invite-card .ic-emoji{font-size:30px}
.invite-card .ic-title{font-family:'Jua';font-size:16px;margin:6px 0 2px}
.invite-card .ic-desc{font-size:12px;color:var(--ink-dim)}
.invite-card .ic-act{display:flex;gap:8px;margin-top:12px}
.invite-card .ic-act button{flex:1;border:none;border-radius:12px;padding:9px;font-family:'Jua';font-size:13px;cursor:pointer}
.btn-accept{background:linear-gradient(120deg,var(--lamp),var(--sunset));color:#3a1500}
.btn-avoid{background:rgba(255,255,255,.12);color:var(--ink)}

/* 입력바 */
.inputbar{flex:0 0 auto;display:flex;gap:8px;align-items:center;padding:10px 12px;border-top:1px solid var(--line);background:rgba(8,10,26,.6)}
.inputbar .plus{width:40px;height:40px;border-radius:14px;border:none;background:linear-gradient(120deg,var(--purple-2),var(--purple-glow));color:#fff;font-size:20px;cursor:pointer;flex:0 0 auto}
.inputbar input{flex:1;background:rgba(255,255,255,.08);border:1px solid var(--line);border-radius:20px;padding:11px 16px;color:var(--ink);font-family:inherit;font-size:14px;outline:none}
.inputbar .send{width:40px;height:40px;border-radius:14px;border:none;background:linear-gradient(120deg,var(--sunset),var(--sunset-deep));color:#fff;font-size:17px;cursor:pointer;flex:0 0 auto}
.emoji-tray{display:flex;gap:6px;flex-wrap:wrap;padding:8px 12px;border-top:1px solid var(--line);background:rgba(8,10,26,.6);max-height:0;overflow:hidden;transition:max-height .3s}
.emoji-tray.open{max-height:160px}
.emoji-tray .e{font-size:24px;cursor:pointer;padding:6px;border-radius:10px}
.emoji-tray .e:active{background:rgba(255,255,255,.1)}

/* ===== 초대 도착 화면 ===== */
.arrival{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;position:relative;overflow:hidden}
.knock-title{font-family:'Jua';font-size:24px;margin:18px 0 6px;line-height:1.35}
.knock-sub{font-size:13px;color:var(--ink-dim);margin-bottom:8px}
.knock-from{font-size:13px;color:var(--lamp);margin-bottom:26px}
.scene{width:230px;height:230px;position:relative;margin-bottom:6px}
.bigbtns{display:flex;flex-direction:column;gap:12px;width:100%;max-width:280px;margin-top:10px}
.bigbtns button{border:none;border-radius:18px;padding:16px;font-family:'Jua';font-size:17px;cursor:pointer}
.bigbtns .open{background:linear-gradient(120deg,var(--lamp),var(--sunset));color:#3a1500;box-shadow:0 10px 30px rgba(255,154,82,.4)}
.bigbtns .dodge{background:rgba(255,255,255,.08);color:var(--ink-dim);border:1px solid var(--line)}

/* 문 두드림 애니메이션 */
@keyframes knock{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px) rotate(-1deg)}75%{transform:translateX(3px) rotate(1deg)}}
.knocking{animation:knock .5s infinite}

/* ===== 초대장 상세 ===== */
.detail{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px;text-align:center}
.ticket{width:100%;max-width:300px;background:linear-gradient(165deg,#2c2f6b,#1a1c44);border-radius:24px;padding:26px 22px;border:1px solid rgba(255,255,255,.14);box-shadow:var(--shadow);position:relative;overflow:hidden}
.ticket::before,.ticket::after{content:"";position:absolute;width:26px;height:26px;border-radius:50%;background:var(--navy-0);top:50%;transform:translateY(-50%)}
.ticket::before{left:-13px}.ticket::after{right:-13px}
.ticket .emoji{font-size:46px}
.ticket .place{font-family:'Jua';font-size:22px;margin:10px 0 4px}
.ticket .dash{border:none;border-top:1px dashed var(--line);margin:16px 0}
.ticket .quote{font-size:15px;color:var(--lamp);font-style:italic;margin:8px 0}
.ticket .info{font-size:12px;color:var(--ink-dim);line-height:1.7}
.ticket .timepill{display:inline-block;background:rgba(255,154,82,.15);color:var(--sunset);border-radius:14px;padding:4px 14px;font-size:12px;margin-top:8px;font-weight:bold}

/* ===== 회피 연출 ===== */
.dodge-scene{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;position:relative;overflow:hidden}
.dodge-scene .stage{width:240px;height:200px;position:relative;margin-bottom:24px}
.dodge-cap{font-family:'Jua';font-size:18px;margin-bottom:8px}
.dodge-desc{font-size:14px;color:var(--ink-dim);max-width:260px;line-height:1.6}

/* ===== 장소 대화방 ===== */
.place-room{flex:1;display:flex;flex-direction:column;position:relative;overflow:hidden}
.place-sky{position:absolute;inset:0;z-index:0}
.room-top{position:relative;z-index:3;padding:10px 16px;display:flex;align-items:center;gap:10px;background:linear-gradient(180deg,rgba(0,0,0,.45),transparent)}
.room-top .rt-name{font-family:'Jua';font-size:16px;flex:1}
.room-top .rt-sub{font-size:11px;color:var(--ink-dim)}
.timer{font-family:'Jua';font-size:18px;background:rgba(0,0,0,.35);border:1px solid var(--line);border-radius:14px;padding:6px 12px;letter-spacing:1px}
.timer.warn{color:var(--sunset);border-color:var(--sunset);animation:tw 1s infinite}
.room-msgs{position:relative;z-index:3;flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:9px}
.room-msgs::-webkit-scrollbar{width:0}
.room-chars{position:relative;z-index:2;height:120px;display:flex;align-items:flex-end;justify-content:center;gap:18px;padding-bottom:6px}
.char{display:flex;flex-direction:column;align-items:center;gap:4px}
.char .nm{font-size:10px;color:var(--ink-dim)}
.action-tray{position:relative;z-index:3;display:flex;gap:8px;padding:8px 14px;overflow-x:auto}
.action-tray::-webkit-scrollbar{height:0}
.act-btn{flex:0 0 auto;font-size:12px;background:rgba(0,0,0,.35);border:1px solid var(--line);color:var(--ink);border-radius:16px;padding:7px 12px;cursor:pointer;white-space:nowrap}
.act-btn:active{background:var(--purple-2)}

/* 종료 연출 */
.endscene{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;position:relative;overflow:hidden;animation:fadeup .6s}
@keyframes fadeup{from{opacity:0}}
.endscene .em{font-size:54px;margin-bottom:10px;animation:floaty 3s ease-in-out infinite}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.endscene .etext{font-family:'Jua';font-size:20px;margin-bottom:8px}
.endscene .esub{font-size:13px;color:var(--ink-dim);margin-bottom:26px}

/* ===== 장소 모아보기 ===== */
.places-grid{padding:8px 16px 100px;display:flex;flex-direction:column;gap:14px}
.place-card{border-radius:22px;overflow:hidden;position:relative;height:130px;cursor:pointer;border:1px solid var(--line);box-shadow:var(--shadow)}
.place-card .pc-sky{position:absolute;inset:0}
.place-card .pc-info{position:absolute;left:0;right:0;bottom:0;padding:14px 16px;background:linear-gradient(0deg,rgba(5,6,15,.85),transparent);z-index:2}
.place-card .pc-name{font-family:'Jua';font-size:19px;display:flex;align-items:center;gap:8px}
.place-card .pc-vibe{font-size:12px;color:var(--ink-dim);margin-top:3px}
.place-card .pc-time{position:absolute;top:12px;right:12px;z-index:2;font-size:11px;background:rgba(0,0,0,.45);border:1px solid var(--line);border-radius:12px;padding:4px 10px;font-weight:bold}

/* 장소 상세 시트 */
.sheet-mask{position:absolute;inset:0;z-index:80;background:rgba(4,5,14,.6);backdrop-filter:blur(4px);display:none;align-items:flex-end}
.sheet-mask.open{display:flex;animation:fadeup .3s}
.sheet{width:100%;background:linear-gradient(180deg,var(--navy-2),var(--navy-1));border-radius:28px 28px 0 0;padding:8px 22px 26px;border-top:1px solid var(--line);max-height:88%;overflow-y:auto;animation:slideup .35s}
@keyframes slideup{from{transform:translateY(100%)}}
.sheet .grip{width:42px;height:5px;border-radius:3px;background:rgba(255,255,255,.2);margin:6px auto 14px}
.sheet h2{font-family:'Jua';font-size:24px;margin:0 0 2px;display:flex;align-items:center;gap:10px}
.sheet .s-vibe{font-size:13px;color:var(--lamp);font-style:italic;margin-bottom:14px}
.sheet .s-sec{margin:14px 0}
.sheet .s-sec h4{font-size:12px;color:var(--ink-faint);margin:0 0 7px;letter-spacing:.5px}
.tagrow{display:flex;flex-wrap:wrap;gap:7px}
.tag{font-size:12px;background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:14px;padding:6px 12px;color:var(--ink-dim)}
.codebox{display:flex;gap:8px;margin-top:8px}
.codebox input{flex:1;background:rgba(0,0,0,.3);border:1px dashed var(--purple-glow);border-radius:14px;padding:12px;color:var(--lamp);font-family:'Jua';letter-spacing:1.5px;text-align:center;font-size:15px}
.bigcta{width:100%;border:none;border-radius:18px;padding:16px;font-family:'Jua';font-size:17px;cursor:pointer;margin-top:18px;background:linear-gradient(120deg,var(--lamp),var(--sunset));color:#3a1500;box-shadow:0 10px 30px rgba(255,154,82,.35)}

/* ===== 캐릭터 아바타 ===== */
.avatar-screen{padding:8px 20px 100px}
.av-stage{display:grid;place-items:center;padding:18px 0 8px}
.av-stage .ring{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 50% 30%,rgba(124,107,214,.4),transparent 60%);display:grid;place-items:center}
.av-name{text-align:center;font-family:'Jua';font-size:22px;margin:4px 0 2px}
.av-status{text-align:center;font-size:12px;color:var(--ink-dim);margin-bottom:14px}
.cz-sec{margin:14px 0}
.cz-sec h4{font-size:13px;color:var(--ink-dim);margin:0 0 8px}
.swatches{display:flex;gap:10px;flex-wrap:wrap}
.sw{width:42px;height:42px;border-radius:14px;cursor:pointer;border:2px solid transparent}
.sw.on{border-color:var(--lamp);transform:scale(1.08)}
.face-opts{display:flex;gap:10px;flex-wrap:wrap}
.fo{width:54px;height:54px;border-radius:16px;background:rgba(255,255,255,.06);border:2px solid transparent;cursor:pointer;display:grid;place-items:center;font-size:26px}
.fo.on{border-color:var(--lamp);background:rgba(255,212,126,.12)}

/* 토스트 */
.toast{position:absolute;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);z-index:100;
  background:rgba(8,10,26,.95);border:1px solid var(--line);color:var(--ink);padding:11px 18px;border-radius:16px;font-size:13px;opacity:0;transition:.3s;pointer-events:none;box-shadow:var(--shadow);max-width:80%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%)}

/* 빈 화면 안내 */
.empty{padding:60px 30px;text-align:center;color:var(--ink-faint)}
.empty .em{font-size:46px;opacity:.6;margin-bottom:12px}
.section-title{font-family:'Jua';font-size:15px;padding:14px 20px 4px;color:var(--ink-dim)}

/* 작은 라벨 */
.hint{font-size:11px;color:var(--ink-faint);text-align:center;padding:6px}
</style>
</head>
<body>
<div class="bg-stars" id="bgStars"></div>

<div class="phone">
  <div class="notch"></div>
  <div class="statusbar">
    <span id="clock">10:18</span>
    <span class="right">📶 🔋 87%</span>
  </div>

  <div class="screen-wrap" id="screenWrap"><!-- screens injected --></div>

  <!-- 하단 탭 (홈/장소/캐릭터일 때만 표시) -->
  <div class="tabbar" id="tabbar">

const state = { screen:'home', tab:'home', chat:null, place:null, room:null, sheetPlace:null };
const wrap = document.getElementById('screenWrap');
const screens = {};

function mountScreen(id, html){
  let el = screens[id];
  if(!el){ el=document.createElement('div'); el.className='screen'; el.id='scr-'+id; wrap.appendChild(el); screens[id]=el; }
  el.innerHTML = html;
  return el;
}
function show(id){
  Object.values(screens).forEach(s=>s.classList.remove('active'));
  if(screens[id]) screens[id].classList.add('active');
  // 탭바 표시 여부
  const tabScreens=['home','places','avatar','profile'];
  document.getElementById('tabbar').style.display = tabScreens.includes(id)?'flex':'none';
  // 탭 하이라이트
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on', t.dataset.tab===id));
}

function go(id){
  state.screen=id;
  if(id==='home') renderHome();
  else if(id==='places') renderPlaces();
  else if(id==='avatar') renderAvatar();
  else if(id==='profile') renderProfile();
  show(id);
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200);
}

function renderChat(id){

    </div>

        <button class="send" onclick="sendChat()">➤</button>

  `);
}
function msgHTML(m,c){
  if(m.type==='invite'){
    const p=PLACES[m.place];
    return `<div class="invite-card ${m.s==='you'?'in':''}">
      <div class="ic-emoji">${p.emoji}</div>
      <div class="ic-title">${p.mins}분 ${p.name} 초대장</div>
      <div class="ic-desc">${p.quote} · ${m.s==='me'?'전송됨':'도착'}</div>
      ${m.s==='you'?`<div class="ic-act">
        <button class="btn-avoid" onclick="event.stopPropagation();startAvoid('${m.place}')">회피하기</button>
        <button class="btn-accept" onclick="event.stopPropagation();showArrival('${m.place}','${c.peer.name}')">열어보기</button>
      </div>`:`<div class="ic-desc" style="margin-top:8px;color:var(--lamp)">상대의 응답을 기다리는 중…</div>`}
    </div>`;
  }
  if(m.type==='sys') return `<div class="sysline">${m.t}</div>`;
  const who = (m.s==='you'&&c.peer.group&&m.who)?`<div class="who">${m.who}</div>`:'';
  return `<div class="bub ${m.s}">${who}${m.t}</div>`;
}
function sendChat(emoji){
  const inp=document.getElementById('chatInput');
  const text = emoji || (inp?inp.value.trim():'');
  if(!text) return;
  const c=CHATS[state.chat];
  c.msgs.push({s:'me',t:text}); c.last=text; c.time='지금';
  if(inp) inp.value='';
  renderChat(state.chat); scrollMsgs();
  // 상대 자동 응답
  setTimeout(()=>{
    const replies=['ㅋㅋㅋ','오 진짜?','옥상 ㄱ?','그래그래','지금 나갈까','😎'];
    const r=replies[Math.floor(Math.random()*replies.length)];
    c.msgs.push({s:'you',t:r, who:c.peer.group?c.peer.members[Math.floor(Math.random()*3)]:null});
    c.last=r;
    if(state.screen==='chat'&&state.chat===c.peer.id){ renderChat(state.chat); scrollMsgs(); }
  }, 900+Math.random()*700);
}
function toggleEmoji(){ document.getElementById('emojiTray').classList.toggle('open'); }

  openSheetHTML(`

function sendInvite(placeId){
  closeSheet();
  const c=CHATS[state.chat]; const p=PLACES[placeId];
  c.msgs.push({type:'invite', s:'me', place:placeId});
  c.msgs.push({type:'sys', t:`${p.emoji} ${p.name} 초대장을 보냈어요. (${p.invite})`});
  c.last=`${p.emoji} ${p.name} 초대장을 보냈어요`;
  renderChat(state.chat); scrollMsgs();
  // 상대가 초대장을 보내온 것처럼 데모: 잠시 후 내가 받는 초대도 시뮬레이션
  setTimeout(()=>{
    c.msgs.push({type:'sys', t:`${c.peer.name}님이 초대장을 확인했어요. 답장을 기다려요…`});
    if(state.screen==='chat') { renderChat(state.chat); scrollMsgs(); }
  },1100);
  setTimeout(()=>{
    // 상대도 나에게 초대장을 보냄 → 내가 받는 입장 체험
    c.msgs.push({type:'invite', s:'you', place:placeId});
    c.last=`${p.emoji} ${c.peer.name}님의 ${p.name} 초대장`;
    if(state.screen==='chat'){ renderChat(state.chat); scrollMsgs(); }
    toast(`${c.peer.name}님도 초대장을 보냈어요! 열어보기를 눌러보세요`);
  },2200);
}

/* =====================================================================

   ===================================================================== */
function enterRoom(placeId, fromName){
  const p=PLACES[placeId];
  state.room={ place:placeId, from:fromName||'친구', remain:p.mins*60, msgs:[], timer:null, botIdx:0 };
  renderRoom();
  show('room'); state.screen='room';
  // 시작 인사
  pushRoomSys(`${p.emoji} ${p.name}에 입장했어요. ${p.mins}분 뒤 자동으로 닫혀요.`);
  setTimeout(()=>botSpeak(),1200);
  startTimer();
}
function startTimer(){
  const r=state.room;
  r.timer=setInterval(()=>{
    r.remain--;
    const el=document.getElementById('timer');
    if(el){ el.textContent=fmt(r.remain); el.classList.toggle('warn', r.remain<=30); }
    if(r.remain<=0){ clearInterval(r.timer); endRoom(); }
    // 가끔 봇이 말함
    if(r.remain%14===0 && r.remain>4) botSpeak();
  },1000);
}
function fmt(s){ const m=Math.floor(s/60), ss=s%60; return `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`; }
function renderRoom(){
  const r=state.room, p=PLACES[r.place];
  const peer=Object.values(CHATS).find(c=>c.peer.name===r.from)?.peer || FRIENDS[0];
  mountScreen('room', `
    <div class="place-room">
      <div class="place-sky">${skySVG(p.sky)}</div>
      <div class="room-top">
        <button class="back" onclick="confirmLeave()">‹</button>
        <div style="flex:1">
          <div class="rt-name">${p.emoji} ${p.name}</div>
          <div class="rt-sub">${p.vibe} · ${r.from}님과</div>
        </div>
        <div class="timer" id="timer">${fmt(r.remain)}</div>
      </div>
      <div class="room-msgs" id="roomMsgs"></div>
      <div class="room-chars">
        <div class="char">${charSVG(peer.color, peer.face, 64)}<span class="nm">${r.from}</span></div>
        <div class="char">${charSVG(ME.color, ME.face, 64)}<span class="nm">나</span></div>
      </div>
      <div class="action-tray">
        ${p.actions.map(a=>`<button class="act-btn" onclick="doAction('${a}')">${a}</button>`).join('')}
      </div>
      <div class="inputbar" style="background:rgba(0,0,0,.35)">
        <input id="roomInput" placeholder="${p.name}에서 한마디…" onkeydown="if(event.key==='Enter')sendRoom()">
        <button class="send" onclick="sendRoom()">➤</button>
      </div>
    </div>
  `);
  renderRoomMsgs();
}
function renderRoomMsgs(){
  const box=document.getElementById('roomMsgs'); if(!box) return;
  const r=state.room;
  box.innerHTML=r.msgs.map(m=>{
    if(m.type==='sys') return `<div class="sysline">${m.t}</div>`;
    if(m.type==='action') return `<div class="sysline" style="background:rgba(255,212,126,.12);color:var(--lamp)">${m.t}</div>`;
    return `<div class="bub ${m.s}">${m.t}</div>`;
  }).join('');
  box.scrollTop=box.scrollHeight;
}
function pushRoomSys(t){ if(!t) return; state.room.msgs.push({type:'sys',t}); renderRoomMsgs(); }
function sendRoom(){
  const inp=document.getElementById('roomInput'); const t=inp.value.trim(); if(!t) return;
  state.room.msgs.push({s:'me',t}); inp.value=''; renderRoomMsgs();
  setTimeout(botSpeak, 700+Math.random()*600);
}
function botSpeak(){
  const r=state.room; if(!r||r.remain<=0) return; const p=PLACES[r.place];
  const line=p.bot[r.botIdx % p.bot.length]; r.botIdx++;
  r.msgs.push({s:'you',t:line}); renderRoomMsgs();
}
function doAction(a){
  const r=state.room; const peer=r.from;
  state.room.msgs.push({type:'action',t:`나의 캐릭터가 ${a.replace(/^[^ ]+ /,'')} 합니다.`});
  renderRoomMsgs();
}
function confirmLeave(){
  if(confirm('대화방을 나가면 장소가 닫혀요. 나갈까요?')){ endRoom(); }
}
function endRoom(){
  const r=state.room; if(!r) return; clearInterval(r.timer);
  const p=PLACES[r.place];
  mountScreen('end', `
    <div class="endscene">
      <div style="position:absolute;inset:0;opacity:.4">${skySVG(p.sky)}</div>

  `);
  show('end'); state.screen='end';
}

    <div class="appbar"><h1>🧑‍🎤 내 캐릭터</h1></div>
    <div class="scroll"><div class="avatar-screen">
      <div class="av-stage"><div class="ring" id="avStage">${charSVG(ME.color, ME.face, 150)}</div></div>
      <div class="av-name">${ME.name}</div>
      <div class="av-status">🌙 옥상에서 별 보는 중</div>

      <div class="cz-sec"><h4>캐릭터 컬러</h4>
        <div class="swatches">${AV_COLORS.map(c=>`<div class="sw ${c===ME.color?'on':''}" style="background:${c}" onclick="setColor('${c}')"></div>`).join('')}</div>
      </div>
      <div class="cz-sec"><h4>표정</h4>
        <div class="face-opts">${AV_FACES.map(f=>`<div class="fo ${f===ME.face?'on':''}" onclick="setFace('${f}')">${f}</div>`).join('')}</div>
      </div>
      <div class="cz-sec"><h4>장소별 행동 미리보기</h4>
        <div class="tagrow">
          ${Object.values(PLACES).map(p=>`<span class="tag">${p.emoji} ${p.actions[0].replace(/^[^ ]+ /,'')}</span>`).join('')}
        </div>
      </div>
      <div class="hint" style="padding:14px">프로필 대신 캐릭터가 장소마다 다르게 움직여요</div>
    </div></div>
  `);
}
function setColor(c){ ME.color=c; renderAvatar(); }
function setFace(f){ ME.face=f; renderAvatar(); }

/* =====================================================================
   화면: 프로필 / 나
   ===================================================================== */
function renderProfile(){
  mountScreen('profile', `
    <div class="appbar"><h1>🌙 나</h1></div>
    <div class="scroll" style="padding-bottom:90px">
      <div style="display:flex;flex-direction:column;align-items:center;padding:20px">
        <div class="ring" style="width:130px;height:130px;border-radius:50%;background:radial-gradient(circle at 50% 30%,rgba(124,107,214,.4),transparent 60%);display:grid;place-items:center">${charSVG(ME.color, ME.face, 110)}</div>
        <div class="av-name">${ME.name}</div>
        <div class="av-status">"야, 잠깐 옥상으로 올라올래?"</div>
      </div>
      <div class="section-title">내 정보</div>
      ${[['🧑‍🎤 캐릭터 꾸미기','avatar'],['🗺️ 장소 모아보기','places'],['🔑 초대 코드로 입장','code'],['👥 친구 관리','friends'],['🔔 알림 설정','noti'],['🎨 테마 (밤 분위기)','theme'],['ℹ️ 진실의 옥상 소개','about']].map(([t,k])=>`
        <div class="crow" onclick="profileTap('${k}')"><div class="avatar" style="background:rgba(255,255,255,.06);font-size:20px">${t.split(' ')[0]}</div>
        <div class="meta"><div class="name">${t.replace(/^[^ ]+ /,'')}</div></div><span style="color:var(--ink-faint)">›</span></div>`).join('')}
      <div class="hint" style="padding:20px">진실의 옥상 · Truth Rooftop<br>친구들과 특별한 장소에서 만나는 감성 장소형 메신저 🌙🏪✨</div>
    </div>
  `);
}
function profileTap(k){
  if(k==='avatar') go('avatar');
  else if(k==='places') go('places');
  else if(k==='code') openCodeSheet();
  else if(k==='about') openSheetHTML(`<h2>🌙 진실의 옥상</h2><div class="s-vibe">"야, 잠깐 옥상으로 올라올래?"</div>
    <p style="font-size:13px;color:var(--ink-dim);line-height:1.7">단순한 메신저가 아니에요. 친구들과 대화하다가 특정 <b>장소</b>로 초대해, 그곳만의 분위기에서 대화를 나누는 <b>장소 기반 메신저</b>예요.</p>
    <p style="font-size:13px;color:var(--ink-dim);line-height:1.7">싸움·저격·왕따를 위한 앱이 아니라, 친구끼리 장난스럽게 특별한 장소에서 대화하는 경험이 핵심이에요.</p>
    <div class="s-sec"><h4>참고 키워드</h4><div class="tagrow">${['진실의 옥상','야차(YACHA)','셋로그','감성 메신저','종이비행기','방과후','도시 야경','비밀 아지트'].map(t=>`<span class="tag">${t}</span>`).join('')}</div></div>`);
  else toast('데모에서는 생략된 메뉴예요 🌙');
}

/* =====================================================================
   바텀시트 유틸
   ===================================================================== */
function openSheetHTML(html){
  const mask=document.getElementById('sheetMask');
  mask.innerHTML=`<div class="sheet" onclick="event.stopPropagation()"><div class="grip"></div>${html}</div>`;
  mask.classList.add('open');
}
function closeSheet(e){
  if(e && e.target!==document.getElementById('sheetMask')) return;
  document.getElementById('sheetMask').classList.remove('open');
}

/* =====================================================================
   초기화
   ===================================================================== */
function initStars(){
  const c=document.getElementById('bgStars'); let h='';
  for(let i=0;i<70;i++){ h+=`<i style="left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*4}s"></i>`; }
  c.innerHTML=h;
}
function tickClock(){
  const d=new Date();
  document.getElementById('clock').textContent=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
initStars(); tickClock(); setInterval(tickClock,30000);
renderHome(); show('home');
</script>
</body>
</html>
